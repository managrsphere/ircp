overview:
  title: IRCP - Austausch. Innovation. Zukunft
  description: "Der International Roundtable on Community Paramedicine (IRCP) ist ein globales Netzwerk und eine jährlich stattfindende Konferenz zur Weiterentwicklung präklinischer Versorgungskonzepte. Seit über 20 Jahren bringt der IRCP Expertinnen und Experten aus Rettungsdienst, Wissenschaft, Politik und Gesundheitswesen zusammen – um innovative Versorgungsmodelle zu diskutieren, voneinander zu lernen und gemeinsam Lösungen für die Herausforderungen moderner Gesundheitssysteme zu entwickeln."
history:
  title: Ursprung und Entwicklung
  description: "Vom ersten Treffen in Nova Scotia bis zur ersten Ausgabe in Deutschland – eine Reise durch mehr als 20 Jahre Community Paramedicine."
  items:
    - icon: i-lucide-map-pin
      date: 2005
      title: Der Ursprung in Nova Scotia
      description: Rund 50 Fachleute aus Australien, Kanada, Schottland und den USA trafen sich in Nova Scotia. Gemeinsame Herausforderungen wie eine alternde Bevölkerung, begrenzte medizinische Ressourcen in ländlichen Regionen und steigende Anforderungen an vulnerable Gruppen standen im Fokus. Dieses Treffen markierte den Beginn eines internationalen Dialogs.
    - icon: i-lucide-globe
      date: "2005-2010"
      title: Entstehung eines globalen Netzwerks
      description: Aus dem ersten Austausch entstand ein internationales Netzwerk. Der IRCP wird seither jährlich in wechselnden Ländern ausgerichtet. Früh wurde deutlich – die Herausforderungen der präklinischen Versorgung sind weltweit vergleichbar. Community Paramedicine entwickelte sich zu einer praxisnahen Antwort auf reale Versorgungsprobleme.
    - icon: i-lucide-award
      date: Heute
      title: Wichtigste internationale Plattform
      description: Der IRCP zählt heute zu den wichtigsten internationalen Plattformen für den Austausch innovativer und praxisorientierter Versorgungskonzepte.
    - icon: i-lucide-flag
      date: 2026
      title: Erstmals in Deutschland (Regensburg)
      description: Zum ersten Mal findet der IRCP in Deutschland statt. Viele Entwicklungen im deutschen Rettungswesen haben ihren Ursprung in Regensburg. Als Gastgeber bringt das Bayerische Rote Kreuz und insbesondere der Kreisverband Regensburg seine langjährige Erfahrung, Forschung und internationale Zusammenarbeit ein.
mission:
  headline: Versorgung neu denken.
  title: Mission & Vision
  description: "Versorgungslücken schließen und neue Wege in der ambulanten und präventiven Versorgung gestalten"
  items:
    - icon: i-lucide-users
      title: Curricula & Bildung
      description: Entwicklung und internationaler Austausch von Curricula im Bereich der Community Paramedicine sowie Förderung von Bildungsreformen.
    - icon: i-lucide-database
      title: Forschung & Daten
      description: Aufbau standardisierter Datensätze und Forschungsstrukturen sowie Förderung internationaler Forschung und Publikationen.
    - icon: i-lucide-lightbulb
      title: Best-Practice-Modelle
      description: Austausch von bewährten Modellen und operativen Konzepten sowie Sichtbarmachung innovativer Projekte und Pilotprogramme.
    - icon: i-lucide-network
      title: Internationale Vernetzung
      description: Strategische Weiterentwicklung präklinischer Versorgungssysteme durch kontinuierlichen internationalen Dialog und Zusammenarbeit.
    - icon: i-lucide-heart-pulse
      title: Patientenzentrierte Versorgung
      description: Vision einer patientenzentrierten Gesundheitsversorgung, in der der Rettungsdienst in erweiterten Rollen tätig ist und vernetzt mit anderen Gesundheitsdienstleistern zusammenarbeitet.
    - icon: i-lucide-trending-up
      title: Versorgungslücken schließen
      description: Neue Wege in der ambulanten und präventiven Versorgung gestalten und durch erweiterte Rollenprofile im Rettungsdienst Versorgungslücken schließen.
ircp2026:
  headline: Seien Sie dabei - Jetzt Tickets sichern!
  title: Erstmals in Deutschland
  description: Mit dem IRCP 2026 in Regensburg wird der Kongress erstmals in Deutschland ausgerichtet – ein bedeutender Schritt für die Weiterentwicklung innovativer Versorgungsmodelle im deutschsprachigen Raum. Vernetzen Sie sich international, lernen Sie von globalen Best-Practice-Modellen und gestalten Sie die Zukunft des Rettungsdienstes aktiv mit.
program:
  headline: Internationale Expertise. Praxisnaher Austausch.
  title: Programm
  description: Ein vielseitiges Programm mit internationalen Vorträgen, fachlichen Diskussionen, Best-Practice-Beispielen und Raum für persönlichen Austausch.
  alert:
    icon: i-lucide-alert-triangle
    title: Programmhinweis
    description: Das vollständige Programm wird in Kürze veröffentlicht. Schauen Sie regelmäßig vorbei, um Updates zu Speakern, Sessions und Programmpunkten zu erhalten.
  items:
    - icon: i-lucide-earth
      title: Community Paramedicine weltweit
    - icon: i-lucide-route
      title: Vorbeugender Rettungsdienst und alternative Versorgungspfade
    - icon: i-lucide-microscope
      title: Forschung, Daten und Evaluation
    - icon: i-lucide-graduation-cap
      title: Bildung, Curriculum und Kompetenzentwicklung
    - icon: i-lucide-blocks
      title: Systemintegration und interprofessionelle Zusammenarbeit
    - icon: i-lucide-landmark
      title: Politik, Governance und regulatorische Rahmenbedingungen
    - icon: i-lucide-cpu
      title: Innovation, Technologie und Versorgungssteuerung
callForSpeakers:
  headline: Jetzt Beitrag bis zum 21. Mai 2026 einreichen
  title: Call for Speakers
  description: Gestalten Sie den IRCP 2026 mit und bringen Sie Ihre Erfahrungen, Forschungsergebnisse oder innovativen Projekte auf eine internationale Bühne.
  callout: 
    title: Sie möchten Ihre Erfahrungen, Forschungsergebnisse oder innovativen Projekte auf einer internationalen Bühne präsentieren?
    description: Dann freuen wir uns auf Ihre Einreichung. Der Call for Speakers richtet sich an Expertinnen und Experten aus Praxis, Wissenschaft, Bildung, Management, Politik und angrenzenden Bereichen, die zur Weiterentwicklung von Community Paramedicine und präklinischer Versorgung beitragen. Willkommen sind sowohl wissenschaftliche Beiträge als auch praxisorientierte Impulse.
  features:
    - icon: i-lucide-globe-2
      title: Internationale Best-Practice-Modelle
      description: Teilen Sie erfolgreiche Konzepte aus Ihrer Region mit einem globalen Publikum.
    - icon: i-lucide-flask-conical
      title: Forschung und Evaluation
      description: Präsentieren Sie evidenzbasierte Erkenntnisse und Studienergebnisse.
    - icon: i-lucide-landmark
      title: Governance und Gesundheitspolitik
      description: Diskutieren Sie regulatorische Rahmenbedingungen und politische Entwicklungen.
    - icon: i-lucide-graduation-cap
      title: Ausbildung, Curriculum und Workforce Development
      description: Gestalten Sie die Bildungsreformen der präklinischen Versorgung mit.
    - icon: i-lucide-cpu
      title: Versorgungsinnovation und Technologie
      description: Zeigen Sie, wie Innovation die Versorgungssteuerung verändert.
    - icon: i-lucide-stethoscope
      title: Klinische Konzepte und neue Rollenprofile
      description: Bringen Sie neue klinische Ansätze und Rollenprofile auf die internationale Bühne.
    - icon: i-lucide-layers
      title: Systemintegration und interprofessionelle Zusammenarbeit
      description: Vernetzen Sie Versorgungssysteme und fördern Sie interprofessionelle Ansätze.
    - icon: i-lucide-trending-up
      title: Finanzierung und strategische Weiterentwicklung
      description: Entwickeln Sie nachhaltige Finanzierungs- und Strategiemodelle gemeinsam weiter.
  alert:
    icon: i-lucide-info
    title: Einreichungen
    description: Weitere Informationen zu Einreichungsformaten, Fristen und Auswahlkriterien finden Sie auf der internationalen Website des IRCP.
    actions:
      - icon: i-lucide-link
        to: https://events.prehos.net/IRCP2026#/abstract?lang=en
        target: _blank
tickets:
  headline: Jetzt Teil des IRCP 2026 werden
  title: Tickets & Registrierung
  description: One Profession. Worldwide Community. Die Registrierung erfolgt über eine internationale Plattform und ein globales Organisationsnetzwerk.
  callout:
    title: Warum sind die Ticketpreise in US-Dollar angegeben?
    description: "Die Registrierung erfolgt über eine internationale Plattform und ein globales Organisationsnetzwerk, weshalb die Preise aktuell in US-Dollar (USD) dargestellt werden. Für Teilnehmende aus Europa bedeutet das jedoch keinen Nachteil: Die Zahlung erfolgt automatisch in Ihrer lokalen Währung (z. B. Euro), der Betrag wird zum aktuellen Wechselkurs berechnet, und es entstehen keine zusätzlichen versteckten Gebühren durch den Veranstalter. Der IRCP steht für eine weltweite Community – und genau deshalb ist auch das Ticketing international ausgerichtet."
  pricing:
    - title: Attending Delegate
      description: Für Expertinnen und Experten aus Rettungsdienst, Gesundheitswesen, Forschung, Verwaltung und Politik.
      price: $450
      highlight: true
      billingCycle: Person
      features:
        - Zugang zu allen Plenarveranstaltungen, Vorträgen und Panels
        - Teilnahme an Keynotes und Fachsessions
        - Zugang zu Networking-Events
        - Zugriff auf Kongressmaterialien
      button:
        label: Jetzt registrieren
        to: https://events.prehos.net/IRCP2026#/buyTickets/selectTickets?lang=en
        target: _blank
    - title: Student Delegate
      description: Für Studierende in anerkannten Ausbildungs- oder Studiengängen.
      price: $180
      highlight: false
      billingCycle: Person
      features:
        - Zugang zu allen Kongresssessions und Networking-Angeboten
        - Teilnahme am vollständigen Programm zu einem reduzierten Tarif
      button: 
        label: Jetzt registrieren
        to: https://events.prehos.net/IRCP2026#/buyTickets/selectTickets?lang=en
        target: _blank
      terms: "Hinweis: Für dieses Ticket ist ein Nachweis des Studierendenstatus erforderlich."
travel:
  headline: Gemeinsam vor Ort
  title: Anreise & Unterkunft
  description: Regensburg verbindet historische Kulisse mit moderner Infrastruktur und bietet den idealen Rahmen für einen internationalen Kongress.
  arrival:
    train:
      title: Anreise per Bahn
      description: Regensburg ist bequem über das Netz der Deutschen Bahn erreichbar, mit direkten Verbindungen aus vielen großen Städten wie München, Nürnberg, Frankfurt und Wien.
    plane:
      title: Anreise per Flugzeug
      description: Von den umliegenden Flughäfen bestehen gute Anschlussmöglichkeiten per Bahn oder Shuttle nach Regensburg.
      airports:
        - name: München (MUC)
          distance: ca. 100 km
        - name: Nürnberg (NUE)
          distance: ca. 120 km
  venue:
    title: Veranstaltungsort – marinaforum Regensburg
    description: Das marinaforum Regensburg bietet den idealen Rahmen für einen internationalen Kongress – modern, offen, zentral gelegen und eingebettet in eine Stadt mit hoher Lebensqualität, Geschichte und internationalem Flair. Das marinaforum liegt zentral im Stadtgebiet und ist gut mit öffentlichen Verkehrsmitteln erreichbar.
    image: /images/marinaforum.jpg
  regensburg:
    title: Regensburg entdecken
    description: Regensburg gehört zu den besterhaltenen mittelalterlichen Städten Europas und ist seit 2006 UNESCO-Weltkulturerbe. Die lebendige Universitätsstadt am Zusammenfluss von Donau und Regen verbindet Geschichte, Kultur und moderne Lebensqualität auf einzigartige Weise.
    images:
      - src: /images/regensburg-1.jpg
        alt: Steinerne Brücke Regensburg
      - src: /images/regensburg-2.jpg
        alt: Donauufer Regensburg
      - src: /images/regensburg-3.jpeg
        alt: BRK Regensburg
      - src: /images/regensburg-4.jpeg
        alt: Skizze Steinerne Brücke Regensburg
      - src: /images/regensburg-5.jpeg
        alt: REF Aufnahme See
      - src: /images/regensburg-6.jpeg
        alt: REF Aufnahme Natur
      - src: /images/regensburg-7.jpeg
        alt: REF Aufnahme Innenstadt
faq:
  headline: FAQ
  title: Häufig gestellte Fragen
  items: 
    - icon: i-lucide-calendar
      label: "Wann findet der IRCP 2026 statt?"
      content: "Der IRCP 2026 findet vom 05. bis 07. Oktober 2026 im marinaforum Regensburg statt."
    - icon: i-lucide-globe
      label: "In welcher Sprache findet der Kongress statt?"
      content: "Der Kongress ist bilingual und umfasst Inhalte in deutscher und englischer Sprache."
    - icon: i-lucide-users
      label: "Für wen ist die Veranstaltung geeignet?"
      content: "Für Fach- und Führungskräfte aus Rettungsdienst, Wissenschaft, Politik, Gesundheitswesen, Bildung und weiteren relevanten Bereichen."
    - icon: i-lucide-file-text
      label: "Kann ich selbst einen Beitrag einreichen?"
      content: "Ja. Informationen zum Call for Speakers werden auf der Website veröffentlicht. Die Einreichung erfolgt über die internationale Website des IRCP."
    - icon: i-lucide-ticket
      label: "Wo finde ich Informationen zu Tickets?"
      content: "Alle Informationen zu Registrierung, Ticketkategorien und Leistungen finden Sie im Registrierungsbereich. Der Ticketkauf findet über die internationale Website des IRCP statt."

  title: IRCP - Austausch. Innovation. Zukunft.
  description: Der International Roundtable on Community Paramedicine (IRCP) ist ein globales Netzwerk und eine jährlich stattfindende Konferenz zur Weiterentwicklung präklinischer Versorgungskonzepte.
overview:
  title: IRCP - Austausch. Innovation. Zukunft.
  description: "Der International Roundtable on Community Paramedicine (IRCP) ist ein globales Netzwerk und eine jährlich stattfindende Konferenz zur Weiterentwicklung präklinischer Versorgungskonzepte. Seit über 20 Jahren bringt der IRCP Expertinnen und Experten aus Rettungsdienst, Wissenschaft, Politik und Gesundheitswesen zusammen – um innovative Versorgungsmodelle zu diskutieren, voneinander zu lernen und gemeinsam Lösungen für die Herausforderungen moderner Gesundheitssysteme zu entwickeln."
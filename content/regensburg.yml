seo:
  title: Regensburg entdecken
  description: Regensburg gehört zu den besterhaltenen mittelalterlichen Städten Europas und ist seit 2006 UNESCO-Weltkulturerbe. Die lebendige Universitätsstadt am Zusammenfluss von Donau und Regen verbindet Geschichte, Kultur und moderne Lebensqualität auf einzigartige Weise.
regensburg:
  title: Regensburg entdecken
  description: Regensburg gehört zu den besterhaltenen mittelalterlichen Städten Europas und ist seit 2006 UNESCO-Weltkulturerbe. Die lebendige Universitätsstadt am Zusammenfluss von Donau und Regen verbindet Geschichte, Kultur und moderne Lebensqualität auf einzigartige Weise. Ob ein Spazierganz entlang der Donau, ein Abend in den traditionellen Wirtshäusern der Altstadt oder Networking mit Blick auf die historische Skyline - Regensburg schafft den perfekten Rahmen für den IRCP 2026.
  callout:
    icon: i-lucide-globe
    title: Experience Bavaria's historic heart while connecting with the international Comunity Paramedicine network.